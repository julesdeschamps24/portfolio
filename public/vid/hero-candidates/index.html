<!doctype html><html lang="fr"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Hero - vidéos candidates</title>
<style>
:root{--bg:#2231d8;--text:#f1f3ff;--soft:#cdd3fc;--line:#4257ec}
*{box-sizing:border-box}
body{margin:0;background:#0d1330;color:var(--text);font-family:system-ui,Segoe UI,Roboto,sans-serif}
header{padding:24px 28px;background:linear-gradient(135deg,#2231d8,#2c3de6)}
h1{margin:0 0 4px;font-size:20px}
p{margin:0;color:var(--soft);font-size:13px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:14px;padding:20px 28px}
figure{margin:0;background:#141a3a;border:1px solid var(--line);border-radius:12px;overflow:hidden}
video{display:block;width:100%;aspect-ratio:16/9;object-fit:cover;background:#000;cursor:pointer}
figcaption{padding:8px 12px;font-size:13px;color:var(--soft);display:flex;justify-content:space-between;align-items:center}
figcaption b{color:var(--text);font-weight:600}
.hint{font-size:12px;color:var(--soft);padding:0 28px 8px}
</style></head>
